name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0, v2.1.3

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libxkbcommon-x11-0 libxcb-xinerama0 dbus-x11

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller PyQt5 PyQtWebEngine
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: |
        pyinstaller ConvoVault.spec

    - name: Archive build (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cd dist
        tar -czvf ConvoVault-${{ runner.os }}.tar.gz ConvoVault/

    - name: Archive build (Windows)
      if: runner.os == 'Windows'
      run: |
        cd dist
        Compress-Archive -Path ConvoVault -DestinationPath ConvoVault-${{ runner.os }}.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ConvoVault-${{ runner.os }}-archive
        path: |
          dist/ConvoVault-${{ runner.os }}.tar.gz
          dist/ConvoVault-${{ runner.os }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-artifacts/ConvoVault-Linux.tar.gz
            dist-artifacts/ConvoVault-macOS.tar.gz
            dist-artifacts/ConvoVault-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
