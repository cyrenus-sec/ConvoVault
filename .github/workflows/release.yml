name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0, v2.1.3

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Install system dependencies (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglx-mesa0 libxkbcommon-x11-0 libxcb-xinerama0 dbus-x11

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --no-cache-dir pyinstaller PyQt5 PyQtWebEngine
        
        # Avoid conflicting torch requirements
        sed -i.bak 's/torch==2.0.1//g' requirements.txt
        
        # Install PyTorch CPU for Linux only to avoid GPU bloat
        pip install --no-cache-dir torch torchvision --index-url https://download.pytorch.org/whl/cpu
        
        pip install --no-cache-dir -r requirements.txt
        git checkout requirements.txt

    - name: Download AI Model
      run: |
        python QuestionAnswering.py

    - name: Build with PyInstaller
      run: |
        pyinstaller ConvoVault.spec

    - name: Archive build
      run: |
        cd dist
        tar -czvf ConvoVault-Linux.tar.gz ConvoVault/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ConvoVault-Linux-archive
        path: dist/ConvoVault-Linux.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist-artifacts/ConvoVault-Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
